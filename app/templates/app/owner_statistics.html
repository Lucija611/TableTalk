{% extends 'app/base.html' %}

{% block content %}
    <h1>Statistics for {{ restaurant.name }}</h1>

    <div style="max-width: 700px; margin-bottom: 30px;">
        <canvas id="commentsLineChart"></canvas>
    </div>

    <div style="max-width: 700px; margin-bottom: 30px;">
        <canvas id="ratioBarChart"></canvas>
    </div>

    <div style="max-width: 450px; margin-bottom: 30px;">
        <canvas id="sentimentPieChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const lineLabels = {{ line_labels|safe }};
        const lineData = {{ line_data|safe }};

        const barLabels = {{ bar_labels|safe }};
        const barData = {{ bar_data|safe }};

        const positiveComments = {{ positive_comments }};
        const negativeComments = {{ negative_comments }};

        new Chart(document.getElementById('commentsLineChart'), {
            type: 'line',
            data: {
                labels: lineLabels,
                datasets: [{
                    label: 'Number of comments',
                    data: lineData
                }]
            }
        });

        new Chart(document.getElementById('ratioBarChart'), {
            type: 'bar',
            data: {
                labels: barLabels,
                datasets: [{
                    label: 'Positive ratio',
                    data: barData
                }]
            },
            options: {
                scales: {
                    y: {
                        min: 0,
                        max: 1
                    }
                }
            }
        });

        new Chart(document.getElementById('sentimentPieChart'), {
            type: 'pie',
            data: {
                labels: ['Positive', 'Negative'],
                datasets: [{
                    data: [positiveComments, negativeComments]
                }]
            }
        });
    </script>
{% endblock %}
